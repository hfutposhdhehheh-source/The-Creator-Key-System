<!DOCTYPE html><html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE CREATOR | GOD MODE</title><script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script><script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script><style>
body{margin:0;background:#000;color:#0f0;font-family:Orbitron,monospace;overflow:hidden}
canvas{position:fixed;top:0;left:0;z-index:0;opacity:.25}

.container{position:relative;z-index:2;display:flex;justify-content:center;align-items:center;height:100vh}

.card{
 backdrop-filter:blur(15px);
 background:rgba(0,20,0,.85);
 border:2px solid #0f0;
 padding:40px;
 border-radius:25px;
 box-shadow:0 0 50px #0f0;
 width:420px;
 text-align:center;
}

h1{letter-spacing:3px}

#key{
 border:1px solid #0f0;
 padding:18px;
 margin:20px 0;
 font-size:18px;
 cursor:pointer;
 min-height:30px;
}

button{
 width:100%;
 padding:16px;
 border:none;
 border-radius:10px;
 font-weight:bold;
 background:linear-gradient(90deg,#0f0,#0ff,#0f0);
 background-size:200%;
 animation:move 2s linear infinite;
 cursor:pointer;
}

@keyframes move{to{background-position:200%}}

.bar{height:6px;background:#022;border-radius:10px;overflow:hidden}
.fill{height:100%;width:0;background:#0f0;transition:.2s}

.logs{
 height:100px;
 overflow:auto;
 font-size:12px;
 text-align:left;
 border:1px solid #064;
 padding:10px;
 margin-top:15px;
}

.toggle{margin-top:10px;font-size:12px;cursor:pointer}

</style></head>
<body><canvas id="bg"></canvas>

<div class="container">
<div class="card">
<h1>THE CREATOR</h1><div id="key">WAITING FOR SYSTEM...</div><div class="bar"><div class="fill" id="fill"></div></div><br><button onclick="generateKey()">GENERATE KEY</button>

<p>USERS: <span id="count">0</span></p>
<p>EXPIRE: <span id="timer">--</span></p><div class="logs" id="logs"></div>
<div class="toggle" onclick="toggleSound()">🔊 SOUND: ON</div>
</div>
</div><audio id="bgm" loop src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3"></audio> <audio id="clickSfx" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>

// Firebase
const firebaseConfig={databaseURL:"https://thecreatorkey-32aaf-default-rtdb.firebaseio.com/"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// Matrix
function matrix(){
 const c=bg,ctx=c.getContext("2d");
 c.width=innerWidth; c.height=innerHeight;
 const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
 const drops=Array(Math.floor(c.width/20)).fill(1);
 setInterval(()=>{
  ctx.fillStyle="rgba(0,0,0,0.07)";
  ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle="#0f0";
  ctx.font="16px monospace";
  drops.forEach((y,i)=>{
   const text=letters[Math.random()*letters.length|0];
   ctx.fillText(text,i*20,y);
   drops[i]=y>c.height?0:y+20;
  });
 },40);
}
matrix();

// logs
function log(t){
 logs.innerHTML+="> "+t+"<br>";
 logs.scrollTop=logs.scrollHeight;
}

// hacker text
function hacker(text){
 let i=0;
 const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
 const inter=setInterval(()=>{
  key.innerText=text.split("").map((c,idx)=> idx<i?text[idx]:chars[Math.random()*chars.length|0]).join("");
  if(i>=text.length) clearInterval(inter);
  i+=0.4;
 },25);
}

// countdown
function countdown(exp){
 clearInterval(window.ct);
 window.ct=setInterval(()=>{
  let d=exp-Date.now();
  if(d<0){timer.innerText="EXPIRED";return}
  let h=Math.floor(d/3600000);
  let m=Math.floor(d%3600000/60000);
  let s=Math.floor(d%60000/1000);
  timer.innerText=`${h}h ${m}m ${s}s`;
 },1000);
}

// sound toggle
let soundOn=true;
function toggleSound(){
 soundOn=!soundOn;
 document.querySelector(".toggle").innerText="🔊 SOUND: "+(soundOn?"ON":"OFF");
 if(soundOn) bgm.play(); else bgm.pause();
}

bgm.volume=0.3;
bgm.play();

// anti spam
let last=0;

async function generateKey(){
 if(Date.now()-last<3000) return Swal.fire("ช้าหน่อย");
 last=Date.now();

 if(soundOn) clickSfx.play();
 navigator.vibrate?.(100);

 fill.style.width="0%";
 let p=0;
 let prog=setInterval(()=>{
  p+=10;
  fill.style.width=p+"%";
 },80);

 log("INITIALIZING...");
 log("BYPASSING FIREWALL...");
 log("ACCESSING DATABASE...");

 const keyVal="CREATOR-"+Math.random().toString(36).slice(2,7).toUpperCase()+"-"+Math.random().toString(36).slice(2,7).toUpperCase();
 const exp=Date.now()+86400000;

 await db.ref("keys/"+keyVal).set({exp,status:"active"});
 db.ref("stats").transaction(v=>(v||0)+1);

 setTimeout(()=>{
  clearInterval(prog);
  hacker(keyVal);
  countdown(exp);
  log("ACCESS GRANTED");
  Swal.fire({icon:"success",title:"KEY GENERATED"});
 },1200);
}

// realtime count
db.ref("stats").on("value",s=>count.innerText=s.val()||0);

// copy
key.onclick=()=>{
 navigator.clipboard.writeText(key.innerText);
 Swal.fire({toast:true,position:"top-end",title:"Copied",showConfirmButton:false,timer:1000});
}

</script></body>
</html>
