<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CREATOR | SUPREME ACCESS HUB</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #0f0; border-radius: 10px; }

        body {
            background: #000;
            color: #0f0;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.25;
        }

        .container {
            z-index: 2;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .card {
            background: rgba(0, 15, 0, 0.85);
            border: 2px solid #0f0;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.4), inset 0 0 20px rgba(0, 255, 0, 0.2);
            backdrop-filter: blur(20px);
            text-align: center;
            transform-style: preserve-3d;
            transition: 0.5s;
        }

        .card:hover {
            transform: rotateY(5deg) rotateX(5deg);
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 5px;
            text-shadow: 0 0 15px #0f0;
            margin-bottom: 5px;
        }

        .version {
            font-size: 0.7rem;
            color: #008800;
            margin-bottom: 25px;
            display: block;
        }

        .key-display-box {
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #0f0;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .key-display-box:hover {
            background: rgba(0, 255, 0, 0.1);
            border-color: #fff;
        }

        #keyLabel {
            font-size: 0.6rem;
            color: #0f0;
            margin-bottom: 10px;
            display: block;
            text-transform: uppercase;
        }

        #keyText {
            font-size: 1.3rem;
            color: #fff;
            letter-spacing: 2px;
            font-weight: bold;
            min-height: 30px;
        }

        .progress-bar-container {
            height: 4px;
            background: rgba(0, 50, 0, 0.5);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0f0, #fff);
            box-shadow: 0 0 10px #0f0;
            transition: width 0.1s linear;
        }

        .btn-gen {
            width: 100%;
            padding: 18px;
            background: #0f0;
            color: #000;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-gen:hover:not(:disabled) {
            background: #fff;
            box-shadow: 0 0 30px #fff;
            transform: scale(1.02);
        }

        .btn-gen:disabled {
            background: #003300;
            color: #006600;
            cursor: not-allowed;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.8rem;
        }

        .stat-item {
            background: rgba(0, 255, 0, 0.03);
            border: 1px solid rgba(0, 255, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
        }

        .logs-window {
            height: 80px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #042;
            margin-top: 20px;
            padding: 10px;
            font-family: monospace;
            font-size: 0.65rem;
            color: #0a0;
            overflow-y: auto;
            text-align: left;
        }

        .sound-control {
            margin-top: 15px;
            font-size: 0.7rem;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        .sound-control:hover { opacity: 1; }

        .pulse { animation: p 1.5s infinite; }
        @keyframes p { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <canvas id="matrixBg"></canvas>

    <div class="container">
        <div class="card">
            <h1>THE CREATOR</h1>
            <span class="version">SUPREME ACCESS v2.5 [GOLDEN-EDITION]</span>

            <div class="key-display-box" onclick="copyToClipboard()">
                <span id="keyLabel">Waiting for authentication...</span>
                <div id="keyText">XXXXX-XXXXX-XXXXX</div>
            </div>

            <div class="progress-bar-container">
                <div class="progress-fill" id="pFill"></div>
            </div>

            <button class="btn-gen" id="genBtn" onclick="processKey()">GENERATE ACCESS KEY</button>

            <div class="logs-window" id="logBox"></div>

            <div class="stats-grid">
                <div class="stat-item">
                    <div>SERVER STATUS</div>
                    <div style="color:#fff;" class="pulse">ENCRYPTED</div>
                </div>
                <div class="stat-item">
                    <div>ACTIVE USERS</div>
                    <div style="color:#fff;" id="userCount">0</div>
                </div>
                <div class="stat-item">
                    <div>EXPIRATION</div>
                    <div style="color:#fff;" id="timerDisplay">24:00:00</div>
                </div>
                <div class="stat-item">
                    <div>SECURITY</div>
                    <div style="color:#fff;">AES-256</div>
                </div>
            </div>

            <div class="sound-control" onclick="toggleAudio()">🔊 AUDIO: ON</div>
        </div>
    </div>

    <audio id="bgm" loop src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>
    <audio id="sfxClick" src="https://www.soundjay.com/button/beep-07.wav"></audio>

    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = { databaseURL: "https://thecreatorkey-32aaf-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAudioOn = true;
        let lastGenTime = 0;
        const BGM = document.getElementById('bgm');
        const SFX = document.getElementById('sfxClick');
        BGM.volume = 0.2;

        // --- MATRIX BACKGROUND ---
        function initMatrix() {
            const c = document.getElementById('matrixBg');
            const ctx = c.getContext('2d');
            c.width = window.innerWidth;
            c.height = window.innerHeight;
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%";
            const fontSize = 16;
            const columns = c.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, c.width, c.height);
                ctx.fillStyle = "#0f0";
                ctx.font = fontSize + "px Orbitron";
                drops.forEach((y, i) => {
                    const char = letters[Math.floor(Math.random() * letters.length)];
                    ctx.fillText(char, i * fontSize, y * fontSize);
                    if (y * fontSize > c.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                });
            }
            setInterval(draw, 35);
        }
        initMatrix();

        // --- CORE FUNCTIONS ---
        function addLog(msg) {
            const box = document.getElementById('logBox');
            box.innerHTML += `> [${new Date().toLocaleTimeString()}] ${msg}<br>`;
            box.scrollTop = box.scrollHeight;
        }

        function toggleAudio() {
            isAudioOn = !isAudioOn;
            document.querySelector('.sound-control').innerText = `🔊 AUDIO: ${isAudioOn ? 'ON' : 'OFF'}`;
            if(isAudioOn) BGM.play(); else BGM.pause();
        }

        window.onclick = () => { if(isAudioOn && BGM.paused) BGM.play().catch(()=>{}); }

        function hackerEffect(targetText) {
            let i = 0;
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            const display = document.getElementById('keyText');
            const inter = setInterval(() => {
                display.innerText = targetText.split("").map((c, idx) => 
                    idx < Math.floor(i) ? targetText[idx] : chars[Math.floor(Math.random() * chars.length)]
                ).join("");
                if(i >= targetText.length) {
                    clearInterval(inter);
                    display.innerText = targetText;
                }
                i += 0.3;
            }, 30);
        }

        function startCountdown(expiry) {
            clearInterval(window.timerInt);
            window.timerInt = setInterval(() => {
                const diff = expiry - Date.now();
                if(diff <= 0) {
                    document.getElementById('timerDisplay').innerText = "EXPIRED";
                    return;
                }
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timerDisplay').innerText = 
                    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        async function processKey() {
            if(Date.now() - lastGenTime < 5000) {
                Swal.fire({icon: 'warning', title: 'ANTI-SPAM', text: 'Please wait 5 seconds.', background: '#000', color: '#0f0'});
                return;
            }
            lastGenTime = Date.now();
            
            const btn = document.getElementById('genBtn');
            const fill = document.getElementById('pFill');
            
            if(isAudioOn) { SFX.currentTime = 0; SFX.play(); }
            
            btn.disabled = true;
            btn.innerText = "AUTHENTICATING...";
            
            // Animation Progress
            let p = 0;
            const pInterval = setInterval(() => {
                p += Math.random() * 5;
                if(p > 100) p = 100;
                fill.style.width = p + "%";
            }, 50);

            addLog("REQUESTING ACCESS...");
            addLog("BYPASSING FIREWALL...");
            
            const newKey = "CREATOR-" + Math.random().toString(36).substr(2, 6).toUpperCase() + "-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            const expTime = Date.now() + (24 * 60 * 60 * 1000); // 24 Hours

            try {
                await db.ref('keys/' + newKey).set({
                    expires: expTime,
                    status: "active",
                    createdAt: new Date().toISOString()
                });
                db.ref('stats').transaction(v => (v || 0) + 1);

                setTimeout(() => {
                    clearInterval(pInterval);
                    fill.style.width = "100%";
                    hackerEffect(newKey);
                    startCountdown(expTime);
                    document.getElementById('keyLabel').innerText = "SYSTEM ACCESS GRANTED:";
                    btn.innerText = "KEY GENERATED";
                    addLog("DATABASE INJECTED SUCCESSFULLY.");
                    addLog("ACCESS KEY: " + newKey);
                    
                    Swal.fire({
                        title: 'ACCESS GRANTED',
                        text: 'Your key has been registered for 24 hours.',
                        icon: 'success',
                        background: '#001500',
                        color: '#0f0',
                        confirmButtonColor: '#0f0'
                    });
                }, 1500);

            } catch (e) {
                addLog("ERROR: " + e.message);
                btn.disabled = false;
                btn.innerText = "RETRY GENERATE";
            }
        }

        function copyToClipboard() {
            const keyText = document.getElementById('keyText').innerText;
            if(keyText.includes("XXXXX")) return;
            navigator.clipboard.writeText(keyText);
            Swal.fire({toast: true, position: 'top-end', title: 'COPIED!', showConfirmButton: false, timer: 1500, background: '#000', color: '#0f0'});
        }

        // Realtime stats
        db.ref('stats').on('value', s => {
            document.getElementById('userCount').innerText = s.val() || 0;
        });
    </script>
</body>
</html>
